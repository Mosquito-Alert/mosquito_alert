---

test_name: Mobile user gets only their notifications.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - user_notification
    - report_notification
    - topic_notification

stages:
  - name: App user list their notifications
    request:
      url: "{api_live_url}/me/{endpoint}/"
      method: "GET"
      headers:
        Authorization: "Bearer {app_user_token}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        count: 3
        results:
          - id: !int "{user_notification.pk}"
          - id: !int "{report_notification.pk}"
          - id: !int "{topic_notification.pk}"
  - id: signup
    type: ref
  - id: login
    type: ref
  - name: App user can are not shown others notifications
    request:
      url: "{api_live_url}/me/{endpoint}/"
      method: "GET"
      headers:
        Authorization: "Bearer {token}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        count: 0

---

test_name: Filter by is_read

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - unseen_user_notification
    - seen_user_notification

stages:
  - name: App user list their notifications by is_read
    request:
      url: "{api_live_url}/me/{endpoint}/"
      params:
        is_read: True
      method: "GET"
      headers:
        Authorization: "Bearer {app_user_token}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        count: 1
        results:
          - id: !int "{seen_user_notification.pk}"

