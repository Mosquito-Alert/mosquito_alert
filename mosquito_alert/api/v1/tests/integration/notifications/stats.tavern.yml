---

test_name: App user can not retrieve stats from their notifications.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - app_user_token
    - user_notification

stages:
  - name: App user can not retrieve their notification stats
    request:
      url: "{api_live_url}/{endpoint}/{user_notification.pk}/stats/"
      method: "GET"
      headers:
        Authorization: "Bearer {app_user_token}"
    response:
      status_code: 403
  # Create a new user
  - id: signup
    type: ref
  - id: login
    type: ref
  - name: App user can not retrieve others notification stats
    request:
      url: "{api_live_url}/{endpoint}/{user_notification.pk}/stats/"
      method: "GET"
      headers:
        Authorization: "Bearer {token}"
    response:
      status_code: 404
