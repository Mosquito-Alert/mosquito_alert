---

test_name: Retrieve stats method is not allowed for non auth user.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - user_notification
    - jwt_token_user

stages:
  - name: Anonymous user can not retrieve
    request:
      url: "{api_live_url}/{endpoint}/{user_notification.pk}/stats/"
      method: "GET"
    response:
      status_code: 401
  - name: User without perm can not retrieve
    request:
      url: "{api_live_url}/{endpoint}/{user_notification.pk}/stats/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 403

---

test_name: Retrieve stats method is allowed for auth user with permissions.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - seen_user_notification
    - jwt_token_user_can_view

stages:
  - name: User with perm can retrieve stats
    request:
      url: "{api_live_url}/{endpoint}/{seen_user_notification.pk}/stats/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view:s}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        recipients:
          - user_uuid: "{app_user.pk}"
            has_read: true


