---

test_name: Capabilities for identification tasks in different countries.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - another_identification_task_another_country
    - user_with_role_annotator_in_country
    - jwt_token_user

stages:
  - name: Annotator from different country cannot access capabilities
    request:
      url: "{api_live_url}/{endpoint}/{another_identification_task_another_country.report.pk}/capabilities/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 404
