test_name: Delete is disabled

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - user_message
    - app_user_token
    - jwt_token_user_can_delete

stages:
  - name: Anonymous users can not delete
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/"
      method: "DELETE"
    response:
      status_code: 401
  - name: Delete method return 403 for app users
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "DELETE"
    response:
      status_code: 403
  # Test django user even with delete permission can not delete
  - name: Delete method return 405 for django users
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/"
      headers:
        Authorization: "Bearer {jwt_token_user_can_delete:s}"
      method: "DELETE"
    response:
      status_code: 405
