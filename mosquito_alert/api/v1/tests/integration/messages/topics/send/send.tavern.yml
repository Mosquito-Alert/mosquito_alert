---

test_name: Users with role reviewer can create messages

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - user_with_role_reviewer
    - topic
    - jwt_token_user

stages:
  - name: Reviewer user can create message
    request:
      url: "{api_live_url}/{endpoint}/{topic.topic_code}/send/"
      json:
        user_uuids:
          - "{app_user.pk}"
        content:
          title:
            en: "english title"
          body:
            en: "english body"
      headers:
        Authorization: "Bearer {jwt_token_user}"
      method: "POST"
    response:
      status_code: 201
      json: !force_format_include "{response_data_validation}"
