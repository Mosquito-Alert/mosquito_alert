test_name: Delete is disabled

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - jwt_token_user_can_delete
    - topic

stages:
  - name: Delete method return 403
    request:
      url: "{api_live_url}/{endpoint}/{topic.topic_code}/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "DELETE"
    response:
      status_code: 403
  - name: Delete method non authenticated users
    request:
      url: "{api_live_url}/{endpoint}/{topic.topic_code}/"
      method: "DELETE"
    response:
      status_code: 401
  - name: Delete method authenticated even users with permissions
    request:
      url: "{api_live_url}/{endpoint}/{topic.topic_code}/"
      headers:
        Authorization: "Bearer {jwt_token_user_can_delete}"
      method: "DELETE"
    response:
      status_code: 405
