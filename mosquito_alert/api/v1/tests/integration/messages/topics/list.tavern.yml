test_name: List is not allowed for non auth users

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - jwt_token_user
    - app_user_token

stages:
  - name: Non auth user can not list
    request:
      url: "{api_live_url}/{endpoint}/"
      method: "GET"
    response:
      status_code: 401
  - name: Mobile users can not list
    request:
      url: "{api_live_url}/{endpoint}/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "GET"
    response:
      status_code: 403
  - name: User without perm can not list
    request:
      url: "{api_live_url}/{endpoint}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 403

---

test_name: List method is allowed for auth user with permissions.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - jwt_token_user_can_view
    - topic

stages:
  - name: User with perm can list
    request:
      url: "{api_live_url}/{endpoint}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view:s}"
    response:
      status_code: 200
      json: !force_original_structure "{response_list_data_validation}"

---

test_name: Search by code
includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - topic
    - jwt_token_user_can_view

stages:
  - name: App user list their topics by topic code
    request:
      url: "{api_live_url}/{endpoint}/"
      params:
        search: "{topic.topic_code}"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        count: 1
        results:
          - code: "{topic.topic_code}"
