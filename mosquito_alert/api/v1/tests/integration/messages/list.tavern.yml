---

test_name: Filter by recipient_uuids
includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - user_message
    - jwt_token_user_can_view
  - parametrize:
      key: endpoint
      vals:
        - "{endpoint}"
        - "me/{endpoint}/sent"

stages:
  - name: App user list their messages by not recipient_uuids
    request:
      url: "{api_live_url}/{endpoint}/"
      params:
        recipient_uuids: "{app_user.pk}"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view}"
    response:
      status_code: 200
      strict:
        - json:off
      json:
        count: 1
        results:
          - id: !int "{user_message.pk}"
