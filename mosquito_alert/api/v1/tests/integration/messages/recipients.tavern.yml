---

test_name: Retrieve recipients method is not allowed for non auth user.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - user_message
    - app_user_token
    - jwt_token_user

stages:
  - name: Anonymous user can not retrieve
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/recipients/"
      method: "GET"
    response:
      status_code: 401
  - name: Mobile users can not list
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/recipients/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "GET"
    response:
      status_code: 403
  - name: User without perm can not retrieve
    request:
      url: "{api_live_url}/{endpoint}/{user_message.pk}/recipients/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 403

---

test_name: Retrieve recipients method is allowed for auth user with permissions.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - seen_user_message
    - jwt_token_user_can_view

stages:
  - name: User with perm can retrieve recipients
    request:
      url: "{api_live_url}/{endpoint}/{seen_user_message.pk}/recipients/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view:s}"
    response:
      status_code: 200
      json:
        - user:
            uuid: "{app_user.pk}"
            locale: "{app_user.locale}"
          has_read: true


