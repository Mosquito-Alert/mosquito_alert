---

test_name: Users with role reviewer can retrieve messages recipients even they have not send the message

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user
    - user_with_role_reviewer
    - user_message_sent_by_other_user
    - jwt_token_user

stages:
  - name: Reviewer user can retrieve message recipients even they have not send the message
    request:
      url: "{api_live_url}/{endpoint}/{user_message_sent_by_other_user.pk}/recipients/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user}"
    response:
      status_code: 200
      json:
        - user:
            uuid: "{app_user.pk}"
            locale: "{app_user.locale}"
          has_read: false
