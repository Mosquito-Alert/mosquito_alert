test_name: Update is disabled

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - workspace_collaboration
    - jwt_token_user_can_change
  - parametrize:
      key: method
      vals:
        - PUT
        - PATCH

stages:
  - name: Update is disabeld for mobile users
    request:
      url: "{api_live_url}/{endpoint}/{workspace_collaboration.pk}/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "{method}"
    response:
      status_code: 403
  - name: Update is disabeld for non auth users
    request:
      url: "{api_live_url}/{endpoint}/{workspace_collaboration.pk}/"
      method: "{method}"
    response:
      status_code: 401
  - name: Update is disabeld users even with permissions
    request:
      url: "{api_live_url}/{endpoint}/{workspace_collaboration.pk}/"
      headers:
        Authorization: "Bearer {jwt_token_user_can_change}"
      method: "{method}"
    response:
      status_code: 405
