    request:
      url: "{api_live_url}/{endpoint}/{workspace.pk}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view:s}"
    response:
      status_code: 200
      json: !force_format_include "{response_data_validation}"
  - name: User with perm view can retrieve workspace where is not a member
    request:
      url: "{api_live_url}/{endpoint}/{another_workspace.pk}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user_can_view:s}"
    response:
      status_code: 200
      json: !force_format_include "{response_data_validation}"
