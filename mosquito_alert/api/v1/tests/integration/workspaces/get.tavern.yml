---

test_name: Workspaces can not be retrieved by users without permission.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - workspace

stages:
  - name: Retrieve is not allowed for mobile users
    request:
      url: "{api_live_url}/{endpoint}/{workspace.pk}/"
      headers:
        Authorization: "Bearer {app_user_token}"
      method: "GET"
    response:
      status_code: 403
  - name: Non auth user can not retrieve
    request:
      url: "{api_live_url}/{endpoint}/{workspace.pk}/"
      method: "GET"
    response:
      status_code: 401

---

test_name: Workspace can be retrieved by users that are members and have no view permissions

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
    - workspace
    - another_workspace
    - jwt_token_user

stages:
  - name: User without perm view can retrieve workspace where is a member
    request:
      url: "{api_live_url}/{endpoint}/{workspace.pk}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 200
      json: !force_format_include "{response_data_validation}"
  - name: User without perm view cannot retrieve workspace where is not a member
    request:
      url: "{api_live_url}/{endpoint}/{another_workspace.pk}/"
      method: "GET"
      headers:
        Authorization: "Bearer {jwt_token_user:s}"
    response:
      status_code: 404

---

test_name: Workspace can be retrieved by users that have view permissions.

includes:
  - !include schema.yml

marks:
  - usefixtures:
    - api_live_url
    - app_user_token
